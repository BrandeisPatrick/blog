<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Both models name the loop-engineering folklore in their reasoning chains. K3 cites 'inspired by real-world patterns: Anthropic's Claude Code with stop hooks' and 'the Ralph loop — Geoffrey Huntley', then scrubs the vendor names from its output: claude -p becomes agent --prompt, Huntley becomes practitioner folklore. K2.6 names 'Ralph loop' and guesses 'from some benchmark', with no scrubbing ritual — it just writes the document.">
  <rect width="760" height="340" fill="#ffffff"/>
  <defs>
    <marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6b6b66"/>
    </marker>
  </defs>

  <text x="20" y="24" font-size="13" font-weight="700" fill="#1b1b1a">Both models know this genre by name &#8212; only one scrubs it</text>

  <!-- ===== K3 column ===== -->
  <text x="20" y="52" font-size="13" font-weight="700" fill="#178a5c">K3</text>

  <rect x="20" y="62" width="348" height="112" rx="8" fill="#f2f9f5" stroke="#178a5c" stroke-dasharray="5 4"/>
  <text x="34" y="82" font-size="10.5" fill="#6b6b66" font-weight="600">IN THE REASONING CHAIN</text>
  <text x="34" y="103" font-size="11" fill="#1b1b1a" font-style="italic">&#8220;inspired by real-world patterns: Anthropic&#8217;s</text>
  <text x="34" y="118" font-size="11" fill="#1b1b1a" font-style="italic">Claude Code with stop hooks&#8221;</text>
  <text x="34" y="141" font-size="11" fill="#1b1b1a" font-style="italic">&#8220;the &#8216;Ralph&#8217; loop &#8212; Geoffrey Huntley&#8221;</text>
  <text x="34" y="162" font-size="10.5" fill="#6b6b66">names the vendor, the feature, and the author</text>

  <line x1="194" y1="174" x2="194" y2="198" stroke="#6b6b66" stroke-width="1.4" marker-end="url(#fa)"/>
  <text x="204" y="192" font-size="10.5" fill="#178a5c" font-weight="600">sanitized before output</text>

  <rect x="20" y="202" width="348" height="110" rx="8" fill="#ffffff" stroke="#c9c9c4"/>
  <text x="34" y="222" font-size="10.5" fill="#6b6b66" font-weight="600">IN THE EMITTED DOCUMENT</text>
  <text x="34" y="243" font-size="11" fill="#6b6b66" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-decoration="line-through">claude -p "$(cat PROMPT.md)"</text>
  <text x="34" y="264" font-size="11" fill="#1b1b1a" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">agent --prompt "$(cat PROMPT.md)"</text>
  <text x="34" y="290" font-size="10.5" fill="#178a5c" font-weight="600">vendor names scrubbed &#8212; Huntley becomes</text>
  <text x="34" y="304" font-size="10.5" fill="#178a5c" font-weight="600">anonymous &#8220;practitioner folklore&#8221;</text>

  <!-- ===== K2.6 column ===== -->
  <text x="392" y="52" font-size="13" font-weight="700" fill="#b5482e">K2.6</text>

  <rect x="392" y="62" width="348" height="112" rx="8" fill="#fdf3f0" stroke="#b5482e" stroke-dasharray="5 4"/>
  <text x="406" y="82" font-size="10.5" fill="#6b6b66" font-weight="600">IN THE REASONING CHAIN</text>
  <text x="406" y="103" font-size="11" fill="#1b1b1a" font-style="italic">&#8220;Ralph loop&#8221;</text>
  <text x="406" y="126" font-size="11" fill="#1b1b1a" font-style="italic">&#8220;from some benchmark&#8221; &#183; claims it has seen</text>
  <text x="406" y="141" font-size="11" fill="#1b1b1a" font-style="italic">&#8220;previous similar tasks&#8221;</text>
  <text x="406" y="162" font-size="10.5" fill="#6b6b66">names the genre, guesses the context</text>

  <line x1="566" y1="174" x2="566" y2="198" stroke="#6b6b66" stroke-width="1.4" marker-end="url(#fa)"/>
  <text x="576" y="192" font-size="10.5" fill="#6b6b66">no scrubbing ritual</text>

  <rect x="392" y="202" width="348" height="110" rx="8" fill="#ffffff" stroke="#c9c9c4"/>
  <text x="406" y="222" font-size="10.5" fill="#6b6b66" font-weight="600">IN THE EMITTED DOCUMENT</text>
  <text x="406" y="248" font-size="11" fill="#1b1b1a">Keeps its head down and writes &#8212; no</text>
  <text x="406" y="263" font-size="11" fill="#1b1b1a">sanitization pass, no vendor awareness in</text>
  <text x="406" y="278" font-size="11" fill="#1b1b1a">the output either.</text>
  <text x="406" y="302" font-size="10.5" fill="#6b6b66">the folklore is in its corpus too &#8212; an older copy</text>
</svg>
