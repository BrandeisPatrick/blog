<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Left panel: the longdoc task in loop mode — K3 collapses from 5,666 reasoning tokens on turn 1 to 1,025 on turn 2 and passes; K2.6 escalates from 5,236 to 7,815, and its turn 1 carries a false completion promise. Right panel: generation mode under a bare Continue — K3's runs decay steeply across turns while K2.6 mostly holds its spend. Bottom: one-shot reasoning totals for the same 3-of-3 pass result — K2.6 spends 13,564 tokens, 2.09 times K3's 6,501.">
  <rect width="760" height="460" fill="#ffffff"/>

  <text x="60" y="20" font-size="13" font-weight="700" fill="#1b1b1a">Same task, same loop &#8212; opposite budget curves</text>
  <rect x="580" y="10" width="14" height="4" rx="2" fill="#178a5c"/>
  <text x="600" y="16" font-size="12" fill="#1b1b1a">Kimi K3</text>
  <rect x="664" y="10" width="14" height="4" rx="2" fill="#b5482e"/>
  <text x="684" y="16" font-size="12" fill="#1b1b1a">K2.6</text>

  <text x="60" y="44" font-size="12.5" font-weight="700" fill="#1b1b1a">loop &#183; longdoc (checker feedback)</text>
  <text x="420" y="44" font-size="12.5" font-weight="700" fill="#1b1b1a">generation &#183; bare &#8220;Continue.&#8221;</text>

  <!-- gridlines left panel -->
  <g stroke="#ececec">
    <line x1="60" y1="330" x2="340" y2="330"/><line x1="60" y1="240" x2="340" y2="240"/>
    <line x1="60" y1="150" x2="340" y2="150"/><line x1="60" y1="60" x2="340" y2="60"/>
  </g>
  <g font-size="11" fill="#6b6b66" text-anchor="end">
    <text x="52" y="334">0</text><text x="52" y="244">3k</text>
    <text x="52" y="154">6k</text><text x="52" y="64">9k</text>
  </g>
  <!-- gridlines right panel -->
  <g stroke="#ececec">
    <line x1="420" y1="330" x2="700" y2="330"/><line x1="420" y1="240" x2="700" y2="240"/>
    <line x1="420" y1="150" x2="700" y2="150"/><line x1="420" y1="60" x2="700" y2="60"/>
  </g>

  <text x="24" y="205" font-size="12" fill="#1b1b1a" text-anchor="middle" transform="rotate(-90 24 205)">Reasoning tokens per turn</text>

  <!-- ===== left panel: longdoc loop ===== -->
  <path d="M 110 172.9 L 290 95.55" fill="none" stroke="#b5482e" stroke-width="2.6"/>
  <path d="M 110 160.0 L 290 299.25" fill="none" stroke="#178a5c" stroke-width="2.6"/>
  <circle cx="110" cy="172.9" r="4.5" fill="#b5482e"><title>K2.6 turn 1: 5,236 reasoning tokens — ends in a false promise</title></circle>
  <circle cx="290" cy="95.55" r="4.5" fill="#b5482e"><title>K2.6 turn 2: 7,815 reasoning tokens</title></circle>
  <circle cx="110" cy="160.0" r="4.5" fill="#178a5c"><title>K3 turn 1: 5,666 reasoning tokens, 41 content tokens</title></circle>
  <circle cx="290" cy="299.25" r="4.5" fill="#178a5c"><title>K3 turn 2: 1,025 reasoning tokens — passes</title></circle>

  <text x="102" y="152" font-size="10.5" fill="#178a5c" text-anchor="end" font-weight="600">5,666</text>
  <text x="102" y="188" font-size="10.5" fill="#b5482e" text-anchor="end" font-weight="600">5,236</text>
  <text x="200" y="120" font-size="10.5" fill="#b5482e" font-weight="700" text-anchor="middle">&#9888; false promise on turn 1</text>
  <text x="290" y="82" font-size="11.5" fill="#1b1b1a" font-weight="700" text-anchor="middle" stroke="#ffffff" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round">K2.6 &#183; 7,815</text>
  <text x="290" y="318" font-size="11.5" fill="#1b1b1a" font-weight="700" text-anchor="middle" stroke="#ffffff" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round">K3 &#183; 1,025 &#8594; passes &#10003;</text>

  <!-- ===== right panel: generation ===== -->
  <g fill="none" stroke="#178a5c" stroke-width="1.8" opacity="0.8">
    <path d="M 445 238.9 L 560 294.4 L 675 325.4"><title>K3 · enumerate: 3,038 → 1,188 → 155</title></path>
    <path d="M 445 193.6 L 560 259.9 L 675 288.3"><title>K3 · longdoc: 4,546 → 2,336 → 1,389</title></path>
  </g>
  <path d="M 445 320.2 L 560 317.5 L 675 322.8" fill="none" stroke="#178a5c" stroke-width="1.4" opacity="0.3"><title>K3 · build: idled at 327 → 418 → 241</title></path>
  <g fill="none" stroke="#b5482e" stroke-width="1.8" opacity="0.8">
    <path d="M 445 196.5 L 560 186.3 L 675 254.9"><title>K2.6 · enumerate: 4,451 → 4,789 → 2,505</title></path>
    <path d="M 445 238.6 L 560 274.1 L 675 276.9"><title>K2.6 · build: 3,047 → 1,863 → 1,770</title></path>
  </g>
  <path d="M 445 79.1 L 560 319.2 L 675 298.3" fill="none" stroke="#b5482e" stroke-width="1.4" opacity="0.3"><title>K2.6 · longdoc: 8,365 → 361 → 1,056 (declared done on turn 2)</title></path>

  <!-- x labels -->
  <g font-size="11" fill="#6b6b66" text-anchor="middle">
    <text x="110" y="346">turn 1</text><text x="290" y="346">turn 2</text>
    <text x="445" y="346">turn 1</text><text x="560" y="346">turn 2</text><text x="675" y="346">turn 3</text>
  </g>

  <text x="380" y="366" font-size="11.5" text-anchor="middle" fill="#6b6b66"><tspan fill="#178a5c" font-weight="700">K3: front-load &#8594; collapse</tspan> (cheap iterations)&#160;&#160;&#183;&#160;&#160;<tspan fill="#b5482e" font-weight="700">K2.6: hold / escalate</tspan> (re-verify every turn)</text>

  <!-- ===== bottom strip: one-shot totals ===== -->
  <line x1="60" y1="380" x2="700" y2="380" stroke="#ececec"/>
  <text x="60" y="400" font-size="12" font-weight="700" fill="#1b1b1a">One-shot reasoning totals &#8212; all 3 tasks, both models 3/3 pass</text>

  <text x="242" y="422" font-size="11.5" fill="#1b1b1a" font-weight="600" text-anchor="end">K2.6</text>
  <rect x="250" y="410" width="379.8" height="14" rx="3" fill="#b5482e"/>
  <text x="636" y="422" font-size="11.5" fill="#1b1b1a" font-weight="700">13,564 &#8212; 2.09&#215;</text>

  <text x="242" y="446" font-size="11.5" fill="#1b1b1a" font-weight="600" text-anchor="end">K3</text>
  <rect x="250" y="434" width="182" height="14" rx="3" fill="#178a5c"/>
  <text x="438" y="446" font-size="11.5" fill="#1b1b1a" font-weight="700">6,501</text>
</svg>
