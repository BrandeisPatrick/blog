<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Reasoning tokens per turn on the longdoc task in the loop condition. Kimi K3 falls from 5,666 tokens on turn 1 to 1,025 on turn 2, when it passes. Kimi K2.6 rises from 5,236 to 7,815; a dagger marks its turn 1, whose response contained a false completion promise.">
  <rect width="760" height="360" fill="#ffffff"/>

  <!-- gridlines -->
  <g stroke="#ececec">
    <line x1="120" y1="300" x2="640" y2="300"/>
    <line x1="120" y1="235" x2="640" y2="235"/>
    <line x1="120" y1="170" x2="640" y2="170"/>
    <line x1="120" y1="105" x2="640" y2="105"/>
    <line x1="120" y1="40" x2="640" y2="40"/>
  </g>
  <g font-size="11" fill="#6b6b66" text-anchor="end">
    <text x="112" y="304">0</text><text x="112" y="239">2k</text><text x="112" y="174">4k</text>
    <text x="112" y="109">6k</text><text x="112" y="44">8k</text>
  </g>
  <text x="34" y="170" font-size="12" fill="#1b1b1a" text-anchor="middle" transform="rotate(-90 34 170)">Reasoning tokens per turn</text>

  <!-- K2.6: 5,236 -> 7,815 -->
  <path d="M 190 129.8 L 570 46.0" fill="none" stroke="#b5482e" stroke-width="2.2"/>
  <circle cx="190" cy="129.8" r="4.5" fill="#b5482e"><title>K2.6 turn 1: 5,236 reasoning tokens &#8224;</title></circle>
  <circle cx="570" cy="46.0" r="4.5" fill="#b5482e"><title>K2.6 turn 2: 7,815 reasoning tokens</title></circle>
  <text x="182" y="122" font-size="11" fill="#1b1b1a" text-anchor="end">5,236&#8224;</text>
  <text x="580" y="50" font-size="11.5" fill="#1b1b1a" font-weight="600">K2.6&#8195;7,815</text>

  <!-- K3: 5,666 -> 1,025 -->
  <path d="M 190 115.9 L 570 266.7" fill="none" stroke="#178a5c" stroke-width="2.2"/>
  <circle cx="190" cy="115.9" r="4.5" fill="#178a5c"><title>K3 turn 1: 5,666 reasoning tokens</title></circle>
  <circle cx="570" cy="266.7" r="4.5" fill="#178a5c"><title>K3 turn 2: 1,025 reasoning tokens; run passes</title></circle>
  <text x="182" y="106" font-size="11" fill="#1b1b1a" text-anchor="end">5,666</text>
  <text x="580" y="271" font-size="11.5" fill="#1b1b1a" font-weight="600">K3&#8195;1,025</text>

  <!-- x labels -->
  <g font-size="11" fill="#6b6b66" text-anchor="middle">
    <text x="190" y="322">turn 1</text><text x="570" y="322">turn 2</text>
  </g>

  <text x="120" y="348" font-size="10.5" fill="#6b6b66">&#8224; K2.6&#8217;s turn-1 response contained a false completion promise, rejected by the checker. K3&#8217;s turn 2 passed.</text>
</svg>
