<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 316" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Interactive comparison of KV-cache schemes. Four buttons switch between MHA, MQA, GQA, and MLA. Eight query-head dots on top connect to the key/value heads they read: eight K/V heads for MHA, one shared head for MQA, one head per group of four for GQA, and a single low-rank latent for MLA. A bar below shows the KV cache per token: full size for MHA, 128 times smaller for MQA, 8 to 16 times smaller for GQA, and roughly 57 times per-head compression for MLA.">
<style>.bt{cursor:pointer}#cbar{transition:width .35s ease}</style>
<rect width="760" height="316" fill="#ffffff"/>
<!-- query dots: cx = 170 + 60*i for i=0..7 -> 170..590; cy=96. K/V row top y=158.
     GQA group centroids: (170+230+290+350)/4 = 260 and (410+470+530+590)/4 = 500. -->
<g id="bt0" class="bt"><rect id="br0" x="64" y="20" width="70" height="26" rx="5" fill="#f6f6f4" stroke="#1b1b1a"/><text id="bx0" x="99" y="37" font-size="12" fill="#1b1b1a" text-anchor="middle" font-weight="700">MHA</text></g>
<g id="bt1" class="bt"><rect id="br1" x="146" y="20" width="70" height="26" rx="5" fill="#f6f6f4" stroke="#ececec"/><text id="bx1" x="181" y="37" font-size="12" fill="#1b1b1a" text-anchor="middle">MQA</text></g>
<g id="bt2" class="bt"><rect id="br2" x="228" y="20" width="70" height="26" rx="5" fill="#f6f6f4" stroke="#ececec"/><text id="bx2" x="263" y="37" font-size="12" fill="#1b1b1a" text-anchor="middle">GQA</text></g>
<g id="bt3" class="bt"><rect id="br3" x="310" y="20" width="70" height="26" rx="5" fill="#f6f6f4" stroke="#ececec"/><text id="bx3" x="345" y="37" font-size="12" fill="#1b1b1a" text-anchor="middle">MLA</text></g>
<text x="696" y="37" font-size="11" fill="#6b6b66" text-anchor="end">click a scheme</text>
<text x="64" y="78" font-size="11" fill="#6b6b66">8 query heads</text>
<circle cx="170" cy="96" r="6" fill="#1b1b1a"/>
<circle cx="230" cy="96" r="6" fill="#1b1b1a"/>
<circle cx="290" cy="96" r="6" fill="#1b1b1a"/>
<circle cx="350" cy="96" r="6" fill="#1b1b1a"/>
<circle cx="410" cy="96" r="6" fill="#1b1b1a"/>
<circle cx="470" cy="96" r="6" fill="#1b1b1a"/>
<circle cx="530" cy="96" r="6" fill="#1b1b1a"/>
<circle cx="590" cy="96" r="6" fill="#1b1b1a"/>
<g id="m0">
<line x1="170" y1="103" x2="170" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="230" y1="103" x2="230" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="290" y1="103" x2="290" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="350" y1="103" x2="350" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="410" y1="103" x2="410" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="470" y1="103" x2="470" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="530" y1="103" x2="530" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="590" y1="103" x2="590" y2="158" stroke="#6b6b66" opacity="0.45"/>
<rect x="156" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="170" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<rect x="216" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="230" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<rect x="276" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="290" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<rect x="336" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="350" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<rect x="396" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="410" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<rect x="456" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="470" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<rect x="516" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="530" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<rect x="576" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="590" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<text x="380" y="212" font-size="11" fill="#6b6b66" text-anchor="middle">a K/V head cached for every query head</text>
</g>
<g id="m1" display="none">
<line x1="170" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="230" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="290" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="350" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="410" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="470" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="530" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="590" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<rect x="366" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="380" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<text x="380" y="212" font-size="11" fill="#6b6b66" text-anchor="middle">one K/V head shared by all 8 query heads</text>
</g>
<g id="m2" display="none">
<line x1="170" y1="103" x2="260" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="230" y1="103" x2="260" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="290" y1="103" x2="260" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="350" y1="103" x2="260" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="410" y1="103" x2="500" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="470" y1="103" x2="500" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="530" y1="103" x2="500" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="590" y1="103" x2="500" y2="158" stroke="#6b6b66" opacity="0.45"/>
<rect x="246" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="260" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<rect x="486" y="158" width="28" height="28" rx="4" fill="#fcfcfb" stroke="#2f6f7a" stroke-width="1.6"/><text x="500" y="176" font-size="10.5" fill="#2f6f7a" text-anchor="middle">KV</text>
<text x="380" y="212" font-size="11" fill="#6b6b66" text-anchor="middle">one K/V head per group of 4 query heads</text>
</g>
<g id="m3" display="none">
<line x1="170" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="230" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="290" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="350" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="410" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="470" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="530" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<line x1="590" y1="103" x2="380" y2="158" stroke="#6b6b66" opacity="0.45"/>
<rect x="325" y="158" width="110" height="28" rx="5" fill="#fcfcfb" stroke="#b5482e" stroke-width="1.6"/><text x="380" y="176" font-size="11" fill="#b5482e" text-anchor="middle">latent c<tspan font-size="9.5" dy="3">KV</tspan></text>
<text x="380" y="212" font-size="11" fill="#6b6b66" text-anchor="middle">K and V compressed into one low-rank latent &#8212; only the latent is cached</text>
</g>
<text x="64" y="248" font-size="11" fill="#6b6b66">KV cache per token (relative)</text>
<rect x="64" y="256" width="560" height="13" rx="3" fill="none" stroke="#ececec"/>
<rect id="cbar" x="64" y="256" width="560" height="13" rx="3" fill="#b5482e"/>
<text id="clab" x="632" y="267" font-size="12" font-weight="700" fill="#b5482e">1&#215; (baseline)</text>
<text id="expl" x="64" y="300" font-size="12" fill="#1b1b1a">MHA &#8212; every query head has its own K/V head: full quality, and the full-size cache.</text>
<script><![CDATA[
(function () {
  // Bar widths: 560 * (1, 1/128, 1/16, 1/57) = 560, 4.4, 35, 9.8
  var M = [
    { w: 560, lab: '1× (baseline)', ex: 'MHA — every query head has its own K/V head: full quality, and the full-size cache.' },
    { w: 4.4, lab: '128× smaller', ex: 'MQA — all query heads read one shared K/V head: 128× smaller at 128 heads, at some cost in quality.' },
    { w: 35, lab: '8–16× smaller', ex: 'GQA — K/V shared within groups (4× as drawn; 8–16× at real head counts), near-MHA quality — the open-model default.' },
    { w: 9.8, lab: '~57× per-head', ex: 'MLA — K and V compressed to a low-rank latent; only the latent is cached (93.3% reduction reported).' }
  ];
  var cbar = document.getElementById('cbar'), clab = document.getElementById('clab'),
      expl = document.getElementById('expl');
  function setMode(k) {
    for (var i = 0; i < 4; i++) {
      document.getElementById('m' + i).setAttribute('display', i === k ? 'inline' : 'none');
      document.getElementById('br' + i).setAttribute('stroke', i === k ? '#1b1b1a' : '#ececec');
      document.getElementById('bx' + i).setAttribute('font-weight', i === k ? '700' : '400');
    }
    clab.textContent = M[k].lab;
    expl.textContent = M[k].ex;
    cbar.setAttribute('width', M[k].w);
  }
  for (var i = 0; i < 4; i++) (function (k) {
    document.getElementById('bt' + k).addEventListener('click', function () { setMode(k); });
  })(i);
})();
]]></script>
</svg>
