<text x="606" y="240" font-size="10.5" fill="#6b6b66">&#8592; the grid shows</text>
<text x="606" y="254" font-size="10.5" fill="#6b6b66">these layers</text>
</g>
<script><![CDATA[
(function () {
  var N = 20, K = 4, G = 2, TOT = 210;
  var cells = document.getElementById('cells').children;
  var BL = [[2, 0], [3, 1], [4, 2], [4, 0]];
  function blk(i, j) {
    var r = (i / 4) | 0, c = (j / 4) | 0;
    for (var b = 0; b < BL.length; b++) if (BL[b][0] === r && BL[b][1] === c) return true;
    return false;
  }
  function on(m, i, j) {
    if (m === 0) return true;
    if (m === 1 || m === 4) return i - j < K;
    if (m === 2) return i - j < K || j < G;
    return i - j < 2 || blk(i, j);
  }
  var EX = [
    ['Every token attends to every earlier token —', 'exact recall anywhere, at O(N²) compute.'],
    ['Each token sees only the last 4 keys — cheap,', 'but any long-range link is simply gone.'],
    ['A few global tokens anchor the start: every', 'token can still reach them, and it stays O(N).'],
    ['The model learns which blocks to keep —', 'sparsity trained end-to-end (NSA, MoBA, DSA).'],
    ['Cheap layers fill most of the stack; a minority', 'of full-attention layers does precise recall.']
  ];
  var cnt = document.getElementById('cnt'), ex1 = document.getElementById('ex1'),
      ex2 = document.getElementById('ex2'), stack = document.getElementById('stack');
  function set(m) {
    var idx = 0, c = 0;
    for (var i = 0; i < N; i++) for (var j = 0; j <= i; j++) {
      var o = on(m, i, j);
      cells[idx].setAttribute('fill', o ? '#b5482e' : '#f6f6f4');
      if (o) c++;
      idx++;
    }
    cnt.textContent = c + ' of ' + TOT + ' — ' + Math.round(c / TOT * 100) + '%' + (m === 4 ? ' (cheap layers)' : '');
    ex1.textContent = EX[m][0];
    ex2.textContent = EX[m][1];
    stack.setAttribute('display', m === 4 ? 'inline' : 'none');
    for (var k = 0; k < 5; k++) {
      document.getElementById('pr' + k).setAttribute('stroke', k === m ? '#1b1b1a' : '#ececec');
      document.getElementById('pt' + k).setAttribute('font-weight', k === m ? '700' : '400');
    }
  }
  for (var k = 0; k < 5; k++) (function (m) {
    document.getElementById('pb' + m).addEventListener('click', function () { set(m); });
  })(k);
})();
]]></script>
</svg>
