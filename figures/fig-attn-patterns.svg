<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Interactive attention-pattern explorer. A 20-by-20 causal lower-triangular grid of query-key cells, 210 in all. Five buttons switch the pattern: dense computes all 210 cells; a sliding window of 4 computes 74; window plus 2 global tokens computes 105; learned blocks compute 103; the hybrid stack shows the sliding-window pattern beside a layer strip with one full-attention layer per three cheap layers. A counter reports cells computed and the percentage.">
<style>.bt{cursor:pointer}</style>
<rect width="760" height="400" fill="#ffffff"/>
<!-- grid: x0=90 y0=72, pitch 14, cell 13; grid spans x 90-370, y 72-352 -->
