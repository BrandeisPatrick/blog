<text x="420" y="88" font-size="11" fill="#6b6b66">score-matrix cells computed:</text>
<text id="cnt" x="420" y="110" font-size="15" fill="#1b1b1a" font-weight="700">210 of 210 &#8212; 100%</text>
<text id="ex1" x="420" y="134" font-size="11.5" fill="#6b6b66">Every token attends to every earlier token &#8212;</text>
<text id="ex2" x="420" y="150" font-size="11.5" fill="#6b6b66">exact recall anywhere, at O(N&#178;) compute.</text>
