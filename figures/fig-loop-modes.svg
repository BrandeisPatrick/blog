<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Three harness modes: one-shot (prompt to model to answer), generation (the same turn repeated by a bare Continue message), and the Ralph/goal loop, where a stop hook runs a checker and either blocks the exit and re-feeds the same prompt with feedback, or lets the run end once the checker passes and the model emits the completion promise.">
  <rect width="760" height="400" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6b6b66"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#178a5c"/>
    </marker>
  </defs>

  <!-- ===== Lane 1: one-shot ===== -->
  <text x="24" y="52" font-size="13" font-weight="700" fill="#1b1b1a">one-shot</text>
  <rect x="150" y="30" width="92" height="34" rx="6" fill="#f6f6f4" stroke="#ececec"/>
  <text x="196" y="51" font-size="12.5" fill="#1b1b1a" text-anchor="middle">prompt</text>
  <line x1="242" y1="47" x2="296" y2="47" stroke="#6b6b66" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="300" y="30" width="104" height="34" rx="6" fill="#ffffff" stroke="#c9c9c4"/>
  <text x="352" y="51" font-size="12.5" fill="#1b1b1a" text-anchor="middle">model turn</text>
  <line x1="404" y1="47" x2="458" y2="47" stroke="#6b6b66" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="462" y="30" width="92" height="34" rx="6" fill="#f6f6f4" stroke="#ececec"/>
  <text x="508" y="51" font-size="12.5" fill="#1b1b1a" text-anchor="middle">answer</text>

  <!-- ===== Lane 2: generation ===== -->
  <text x="24" y="141" font-size="13" font-weight="700" fill="#1b1b1a">generation</text>
  <rect x="150" y="119" width="92" height="34" rx="6" fill="#f6f6f4" stroke="#ececec"/>
  <text x="196" y="140" font-size="12.5" fill="#1b1b1a" text-anchor="middle">prompt</text>
  <line x1="242" y1="136" x2="296" y2="136" stroke="#6b6b66" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="300" y="119" width="80" height="34" rx="6" fill="#ffffff" stroke="#c9c9c4"/>
  <text x="340" y="140" font-size="12.5" fill="#1b1b1a" text-anchor="middle">turn 1</text>
  <line x1="380" y1="136" x2="446" y2="136" stroke="#6b6b66" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="413" y="127" font-size="11" fill="#6b6b66" text-anchor="middle" font-style="italic">&#8220;Continue.&#8221;</text>
  <rect x="450" y="119" width="80" height="34" rx="6" fill="#ffffff" stroke="#c9c9c4"/>
  <text x="490" y="140" font-size="12.5" fill="#1b1b1a" text-anchor="middle">turn 2</text>
  <line x1="530" y1="136" x2="596" y2="136" stroke="#6b6b66" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="563" y="127" font-size="11" fill="#6b6b66" text-anchor="middle" font-style="italic">&#8220;Continue.&#8221;</text>
  <rect x="600" y="119" width="80" height="34" rx="6" fill="#ffffff" stroke="#c9c9c4"/>
  <text x="640" y="140" font-size="12.5" fill="#1b1b1a" text-anchor="middle">turn 3</text>
  <text x="196" y="168" font-size="11" fill="#6b6b66" text-anchor="middle">no feedback, no goal</text>

  <!-- ===== Lane 3: loop (Ralph / goal) ===== -->
  <text x="24" y="242" font-size="13" font-weight="700" fill="#1b1b1a">loop</text>
  <text x="24" y="258" font-size="11.5" fill="#6b6b66">(Ralph / goal)</text>

  <rect x="150" y="220" width="92" height="34" rx="6" fill="#f6f6f4" stroke="#ececec"/>
  <text x="196" y="236" font-size="12.5" fill="#1b1b1a" text-anchor="middle">ONE</text>
  <text x="196" y="249" font-size="12.5" fill="#1b1b1a" text-anchor="middle">prompt</text>
  <line x1="242" y1="237" x2="288" y2="237" stroke="#6b6b66" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="292" y="220" width="104" height="34" rx="6" fill="#ffffff" stroke="#c9c9c4"/>
  <text x="344" y="241" font-size="12.5" fill="#1b1b1a" text-anchor="middle">model turn</text>
  <line x1="396" y1="237" x2="446" y2="237" stroke="#6b6b66" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="418" y="226" font-size="10.5" fill="#6b6b66" text-anchor="middle" font-style="italic">tries to stop</text>

  <rect x="450" y="214" width="130" height="46" rx="6" fill="#eaf6f0" stroke="#178a5c"/>
  <text x="515" y="233" font-size="12.5" fill="#1b1b1a" text-anchor="middle" font-weight="600">stop hook</text>
  <text x="515" y="248" font-size="11.5" fill="#1b1b1a" text-anchor="middle">runs the checker</text>

  <!-- pass exit -->
  <line x1="580" y1="237" x2="642" y2="237" stroke="#178a5c" stroke-width="1.6" marker-end="url(#arrg)"/>
  <text x="611" y="228" font-size="11" fill="#178a5c" text-anchor="middle" font-weight="600">pass</text>
  <rect x="646" y="214" width="96" height="46" rx="6" fill="#ffffff" stroke="#178a5c"/>
  <text x="694" y="233" font-size="12" fill="#1b1b1a" text-anchor="middle" font-weight="600">exit</text>
  <text x="694" y="248" font-size="10.5" fill="#6b6b66" text-anchor="middle">iff promise, too</text>

  <!-- fail loop-back -->
  <path d="M 515 260 L 515 322 L 344 322 L 344 258" fill="none" stroke="#178a5c" stroke-width="1.6" marker-end="url(#arrg)"/>
  <text x="430" y="313" font-size="11.5" fill="#178a5c" text-anchor="middle" font-weight="600">fail: stop BLOCKED</text>
  <text x="430" y="340" font-size="11.5" fill="#6b6b66" text-anchor="middle">checker feedback + the SAME prompt re-fed</text>

  <text x="380" y="380" font-size="11.5" fill="#6b6b66" text-anchor="middle">Completion = checker passes AND the model emits &#60;promise&#62;COMPLETE&#60;/promise&#62; &#8212; and it may not lie to exit.</text>
</svg>
