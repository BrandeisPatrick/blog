<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Token allocation within turn 1 of the longdoc task, loop condition. Kimi K3: 5,666 reasoning tokens against 41 tokens of visible output — 0.7 percent of the turn; annotated 'planned a file write; no file system exists'; the checker scored 0 words. Kimi K2.6: 5,236 reasoning tokens against 2,806 output tokens — 34.9 percent of the turn.">
