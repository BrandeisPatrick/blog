<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Token allocation per turn on the longdoc task in the loop condition, reasoning tokens as solid bars and visible-output tokens as outlined bars. Kimi K3 turn 1: 5,666 reasoning versus 41 output — the near-zero output is annotated 'planned a file write; no file system exists' and the checker scored 0 words. K3 turn 2: 1,025 reasoning versus 4,526 output, which passes. Kimi K2.6 turn 1: 5,236 versus 2,806; turn 2: 7,815 versus 3,331 — substantial output every turn.">
  <rect width="760" height="360" fill="#ffffff"/>

  <!-- gridlines -->
  <g stroke="#ececec">
    <line x1="90" y1="300" x2="700" y2="300"/>
    <line x1="90" y1="237.5" x2="700" y2="237.5"/>
    <line x1="90" y1="175" x2="700" y2="175"/>
    <line x1="90" y1="112.5" x2="700" y2="112.5"/>
    <line x1="90" y1="50" x2="700" y2="50"/>
  </g>
  <g font-size="11" fill="#6b6b66" text-anchor="end">
    <text x="82" y="304">0</text><text x="82" y="241.5">2k</text><text x="82" y="179">4k</text>
    <text x="82" y="116.5">6k</text><text x="82" y="54">8k</text>
  </g>
  <text x="26" y="175" font-size="12" fill="#1b1b1a" text-anchor="middle" transform="rotate(-90 26 175)">Tokens in turn</text>

  <!-- legend -->
  <rect x="480" y="14" width="12" height="12" fill="#1b1b1a"/>
  <text x="498" y="24" font-size="11" fill="#1b1b1a">reasoning tokens</text>
  <rect x="612" y="14" width="12" height="12" fill="#ffffff" stroke="#1b1b1a" stroke-width="1.5"/>
  <text x="630" y="24" font-size="11" fill="#1b1b1a">visible output</text>

  <!-- ===== K3 group ===== -->
  <text x="215" y="30" font-size="12.5" fill="#178a5c" font-weight="700">Kimi K3</text>

  <!-- turn 1: reasoning 5666 (h 177.1), output 41 (h ~1.3, drawn 2) -->
  <rect x="120" y="122.9" width="34" height="177.1" fill="#178a5c"><title>K3 turn 1 reasoning: 5,666 tokens</title></rect>
  <text x="137" y="116" font-size="10.5" fill="#1b1b1a" text-anchor="middle" font-weight="600">5,666</text>
  <rect x="160" y="298" width="34" height="2" fill="#ffffff" stroke="#178a5c" stroke-width="1.5"><title>K3 turn 1 visible output: 41 tokens</title></rect>
  <text x="177" y="290" font-size="10.5" fill="#1b1b1a" text-anchor="middle" font-weight="600">41</text>
  <text x="157" y="320" font-size="11" fill="#6b6b66" text-anchor="middle">turn 1</text>
  <text x="157" y="336" font-size="10" fill="#b5482e" text-anchor="middle">checker: 0 words</text>

  <!-- turn 2: reasoning 1025 (h 32), output 4526 (h 141.4) -->
  <rect x="240" y="268" width="34" height="32" fill="#178a5c"><title>K3 turn 2 reasoning: 1,025 tokens</title></rect>
  <text x="257" y="261" font-size="10.5" fill="#1b1b1a" text-anchor="middle" font-weight="600">1,025</text>
  <rect x="280" y="158.6" width="34" height="141.4" fill="#ffffff" stroke="#178a5c" stroke-width="1.5"><title>K3 turn 2 visible output: 4,526 tokens (3,735 words)</title></rect>
  <text x="297" y="152" font-size="10.5" fill="#1b1b1a" text-anchor="middle" font-weight="600">4,526</text>
  <text x="277" y="320" font-size="11" fill="#6b6b66" text-anchor="middle">turn 2</text>
  <text x="277" y="336" font-size="10" fill="#178a5c" text-anchor="middle">pass</text>

  <!-- annotation for the 41-token bar -->
  <path d="M 208 226 L 182 284" fill="none" stroke="#6b6b66" stroke-width="1"/>
  <text x="212" y="222" font-size="10.5" fill="#1b1b1a">planned a file write;</text>
  <text x="212" y="236" font-size="10.5" fill="#1b1b1a">no file system exists</text>

  <!-- ===== K2.6 group ===== -->
  <text x="510" y="30" font-size="12.5" fill="#b5482e" font-weight="700">Kimi K2.6</text>

  <!-- turn 1: reasoning 5236 (h 163.6), output 2806 (h 87.7) -->
  <rect x="430" y="136.4" width="34" height="163.6" fill="#b5482e"><title>K2.6 turn 1 reasoning: 5,236 tokens</title></rect>
  <text x="447" y="129" font-size="10.5" fill="#1b1b1a" text-anchor="middle" font-weight="600">5,236</text>
  <rect x="470" y="212.3" width="34" height="87.7" fill="#ffffff" stroke="#b5482e" stroke-width="1.5"><title>K2.6 turn 1 visible output: 2,806 tokens (2,246 words; false completion promise)</title></rect>
  <text x="487" y="205" font-size="10.5" fill="#1b1b1a" text-anchor="middle" font-weight="600">2,806</text>
  <text x="467" y="320" font-size="11" fill="#6b6b66" text-anchor="middle">turn 1&#8224;</text>
  <text x="467" y="336" font-size="10" fill="#b5482e" text-anchor="middle">154 words short</text>

  <!-- turn 2: reasoning 7815 (h 244.2), output 3331 (h 104.1) -->
  <rect x="550" y="55.8" width="34" height="244.2" fill="#b5482e"><title>K2.6 turn 2 reasoning: 7,815 tokens</title></rect>
  <text x="567" y="49" font-size="10.5" fill="#1b1b1a" text-anchor="middle" font-weight="600">7,815</text>
  <rect x="590" y="195.9" width="34" height="104.1" fill="#ffffff" stroke="#b5482e" stroke-width="1.5"><title>K2.6 turn 2 visible output: 3,331 tokens</title></rect>
  <text x="607" y="189" font-size="10.5" fill="#1b1b1a" text-anchor="middle" font-weight="600">3,331</text>
  <text x="587" y="320" font-size="11" fill="#6b6b66" text-anchor="middle">turn 2</text>
  <text x="587" y="336" font-size="10" fill="#178a5c" text-anchor="middle">pass</text>

  <text x="90" y="354" font-size="10.5" fill="#6b6b66">&#8224; turn-1 response ended with a false completion promise (2,246 words vs. the required 2,400).</text>
</svg>
