<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Billed prompt tokens as a function of prompt length, four measured points per model. Both series share the same slope of roughly 0.22 tokens per character, but K3's line sits a constant 78 tokens above K2.6's at every measured length: K3 bills 89, 110, 170, and 290 tokens where K2.6 bills 11, 32, 92, and 212. The constant vertical offset is annotated as the hidden template.">
  <rect width="760" height="360" fill="#ffffff"/>

  <!-- gridlines -->
  <g stroke="#ececec">
    <line x1="90" y1="300" x2="700" y2="300"/>
    <line x1="90" y1="213.3" x2="700" y2="213.3"/>
    <line x1="90" y1="126.7" x2="700" y2="126.7"/>
    <line x1="90" y1="40" x2="700" y2="40"/>
  </g>
  <g font-size="11" fill="#6b6b66" text-anchor="end">
    <text x="82" y="304">0</text><text x="82" y="217.3">100</text>
    <text x="82" y="130.7">200</text><text x="82" y="44">300</text>
  </g>
  <!-- x ticks -->
  <g font-size="11" fill="#6b6b66" text-anchor="middle">
    <text x="90" y="320">0</text><text x="218.4" y="320">200</text><text x="346.8" y="320">400</text>
    <text x="475.3" y="320">600</text><text x="603.7" y="320">800</text>
  </g>
  <text x="395" y="344" font-size="12" fill="#1b1b1a" text-anchor="middle">Prompt length (characters)</text>
  <text x="26" y="170" font-size="12" fill="#1b1b1a" text-anchor="middle" transform="rotate(-90 26 170)">Billed prompt_tokens</text>

  <!-- K3 series -->
  <path d="M 99.0 222.9 L 157.4 204.7 L 330.8 152.7 L 677.5 48.7" fill="none" stroke="#178a5c" stroke-width="2"/>
  <g fill="#178a5c">
    <circle cx="99.0" cy="222.9" r="4"><title>K3: 14 chars &#8594; 89 tokens</title></circle>
    <circle cx="157.4" cy="204.7" r="4"><title>K3: 105 chars &#8594; 110 tokens</title></circle>
    <circle cx="330.8" cy="152.7" r="4"><title>K3: 375 chars &#8594; 170 tokens</title></circle>
    <circle cx="677.5" cy="48.7" r="4"><title>K3: 915 chars &#8594; 290 tokens</title></circle>
  </g>
  <text x="688" y="52" font-size="11.5" fill="#1b1b1a" font-weight="600">K3</text>

  <!-- K2.6 series -->
  <path d="M 99.0 290.5 L 157.4 272.3 L 330.8 220.3 L 677.5 116.3" fill="none" stroke="#b5482e" stroke-width="2"/>
  <g fill="#b5482e">
    <circle cx="99.0" cy="290.5" r="4"><title>K2.6: 14 chars &#8594; 11 tokens</title></circle>
    <circle cx="157.4" cy="272.3" r="4"><title>K2.6: 105 chars &#8594; 32 tokens</title></circle>
    <circle cx="330.8" cy="220.3" r="4"><title>K2.6: 375 chars &#8594; 92 tokens</title></circle>
    <circle cx="677.5" cy="116.3" r="4"><title>K2.6: 915 chars &#8594; 212 tokens</title></circle>
  </g>
  <text x="688" y="120" font-size="11.5" fill="#1b1b1a" font-weight="600">K2.6</text>

  <!-- constant-offset annotation -->
  <line x1="560" y1="87.5" x2="560" y2="147.9" stroke="#1b1b1a" stroke-width="1.2"/>
  <line x1="554" y1="87.5" x2="566" y2="87.5" stroke="#1b1b1a" stroke-width="1.2"/>
  <line x1="554" y1="147.9" x2="566" y2="147.9" stroke="#1b1b1a" stroke-width="1.2"/>
  <text x="548" y="112" font-size="11.5" fill="#1b1b1a" text-anchor="end" font-weight="600" stroke="#ffffff" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round">constant offset:</text>
  <text x="548" y="127" font-size="11.5" fill="#1b1b1a" text-anchor="end" font-weight="600" stroke="#ffffff" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round">78 tokens</text>

  <text x="90" y="24" font-size="11" fill="#6b6b66">Shared slope &#8776; 0.22 tokens/char (same tokenizer); intercepts &#8776; 86 (K3) vs &#8776; 8 (K2.6).</text>
</svg>
