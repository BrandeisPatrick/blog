<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Why Warmup-Stable-Decay fits a bolt-on training phase: a cosine schedule fixes its horizon in advance and is spent by the end of pretraining, while WSD holds a stable learning-rate plateau from which the decay can be triggered at any point.">
<rect width="760" height="280" fill="#ffffff"/>
<line x1="64" y1="230" x2="700" y2="230" stroke="#ececec"/>
<line x1="64" y1="36" x2="64" y2="230" stroke="#ececec"/>
<text x="382" y="266" font-size="12.5" fill="#1b1b1a" text-anchor="middle">training steps  →</text>
<text x="24" y="133" font-size="12.5" fill="#1b1b1a" text-anchor="middle" transform="rotate(-90 24 133)">learning rate</text>
<path d="M64 230 L120 84 C 240 92, 420 150, 548 230" fill="none" stroke="#6b6b66" stroke-width="2.2"/>
<line x1="548" y1="36" x2="548" y2="230" stroke="#6b6b66" stroke-dasharray="4 3" opacity="0.5"/>
<text x="554" y="50" font-size="11.5" fill="#6b6b66">cosine — horizon fixed in advance,</text>
<text x="554" y="65" font-size="11.5" fill="#6b6b66">schedule already spent</text>
<path d="M64 230 L120 70 L520 70" fill="none" stroke="#2f6f7a" stroke-width="2.5"/>
<path d="M520 70 C 545 90, 560 160, 580 230" fill="none" stroke="#2f6f7a" stroke-width="2.5"/>
<path d="M260 70 C 285 90, 300 160, 320 230" fill="none" stroke="#2f6f7a" stroke-width="1.6" stroke-dasharray="4 3" opacity="0.5"/>
<path d="M390 70 C 415 90, 430 160, 450 230" fill="none" stroke="#2f6f7a" stroke-width="1.6" stroke-dasharray="4 3" opacity="0.5"/>
<text x="150" y="58" font-size="12" fill="#2f6f7a" font-weight="700">WSD — warmup, stable plateau…</text>
<text x="330" y="120" font-size="11.5" fill="#2f6f7a" stroke="#ffffff" stroke-width="3" paint-order="stroke" stroke-linejoin="round">…decay can trigger at any point</text>
</svg>
