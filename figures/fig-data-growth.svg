<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 412" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Two-panel log chart of training-data growth, 2020 to 2026. Top: pretraining corpora grow from GPT-3's 300 billion tokens to about 36 trillion (Qwen3) and 32-33 trillion (DeepSeek-V4) — roughly 100 times in five years. Bottom: post-training sets grow from InstructGPT's 13 thousand prompts to Nemotron 3's 7 million samples — yet even that equals only about 80 billion SFT tokens, 0.3 percent of its own 25-trillion-token pretraining. A hollow square marks NVIDIA's released 33-million-sample Llama-Nemotron dataset.">
