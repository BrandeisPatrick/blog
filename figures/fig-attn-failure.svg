<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="On a linear scale, quadratic attention cost rockets upward and crosses any fixed compute budget long before one million tokens, while sub-quadratic methods rise gently. Going from 2K to 1M tokens is 500 times the tokens but roughly 250,000 times the attention compute.">
<rect width="760" height="320" fill="#ffffff"/>
<line x1="64" y1="270" x2="700" y2="270" stroke="#ececec"/>
<line x1="64" y1="40" x2="64" y2="270" stroke="#ececec"/>
<text x="382" y="306" font-size="12.5" fill="#1b1b1a" text-anchor="middle">context length (linear scale)  →</text>
<text x="24" y="155" font-size="12.5" fill="#1b1b1a" text-anchor="middle" transform="rotate(-90 24 155)">attention compute</text>
<text x="70" y="286" font-size="11" fill="#6b6b66">2K</text>
<text x="700" y="286" font-size="11" fill="#6b6b66" text-anchor="end">1M</text>
<line x1="64" y1="110" x2="700" y2="110" stroke="#1b1b1a" stroke-dasharray="5 4" opacity="0.4"/>
<text x="694" y="102" font-size="11.5" fill="#6b6b66" text-anchor="end">what a fixed compute budget can afford</text>
<path d="M64 248.0 L72 247.9 L80 247.6 L88 247.1 L96 246.4 L104 245.6 L112 244.5 L120 243.2 L128 241.8 L136 240.1 L144 238.3 L152 236.3 L160 234.0 L168 231.6 L176 229.0 L184 226.2 L192 223.2 L200 220.0 L208 216.6 L216 213.0 L224 209.2 L232 205.2 L240 201.1 L248 196.7 L256 192.2 L264 187.4 L272 182.5 L280 177.3 L288 172.0 L296 166.5 L304 160.7 L312 154.8 L320 148.7 L328 142.4 L336 135.9 L344 129.2 L352 122.3 L360 115.3 L368 108.0 L376 100.5 L384 92.9 L392 85.0 L400 77.0 L408 68.7 L416 60.3 L424 51.7 L432 42.8" fill="none" stroke="#b5482e" stroke-width="2.6"/>
<text x="330" y="60" font-size="13" fill="#b5482e" font-weight="700" stroke="#ffffff" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round">standard attention — O(N²)</text>
<circle cx="366" cy="110" r="4.5" fill="#ffffff" stroke="#b5482e" stroke-width="2.2"/>
<text x="378" y="132" font-size="11.5" fill="#b5482e" stroke="#ffffff" stroke-width="3" paint-order="stroke" stroke-linejoin="round">hits the budget long before 1M</text>
<path d="M64 268 L700 218" fill="none" stroke="#2f6f7a" stroke-width="2.6"/>
<text x="694" y="240" font-size="13" fill="#2f6f7a" font-weight="700" text-anchor="end" stroke="#ffffff" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round">sub-quadratic methods — O(N)</text>
<text x="76" y="52" font-size="12" fill="#1b1b1a" font-weight="600">2K → 1M is 500× the tokens,</text>
<text x="76" y="68" font-size="12" fill="#1b1b1a" font-weight="600">but ~250,000× the attention compute</text>
</svg>
