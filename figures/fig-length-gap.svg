<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Dumbbell chart of the training-length gap, one row per model from late 2024 to mid 2026, log token axis. Filled markers show the longest sample in each model's post-training data (SFT squares, RL circles); hollow circles show the context window the model ships or handles. Post-training data tops out between 4 thousand and 512 thousand tokens while the windows above it grew from 128K to 1-10 million: Qwen2.5-1M ran RL on 8K samples against a 1M window. A final dashed marker is DeepSeek-V4, whose RL infrastructure is built for million-token sequences but whose training-data lengths are unpublished.">
